services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_app_postgres
    environment:
      POSTGRES_USER: ai_app
      POSTGRES_PASSWORD: ai_app
      POSTGRES_DB: ai_app
    ports:
      - "5432:5432"
    volumes:
      - ai_app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_app -d ai_app"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ai_app_pgdata:
